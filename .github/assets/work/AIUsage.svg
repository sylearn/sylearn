  <text x="28" y="70" class="sans" font-size="28" font-weight="500" fill="#F5F5F7" letter-spacing="-0.9">AIUsage</text>
  <text x="28" y="94" class="sans" font-size="13" font-weight="400" fill="#C7C7CC" letter-spacing="-0.1">One dashboard for all your AI subscriptions — quotas, costs, accounts,...</text>


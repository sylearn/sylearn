<svg width="1200" height="160" viewBox="0 0 1200 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">sylearn stats</title>
  <desc id="desc">sylearn — followers, stars, repositories, year active</desc>

  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --border: #d8dee4;
        --primary: #1F2328;
        --secondary: #59636e;
        --tertiary: #818b98;
        --accent: #0969da;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --border: #262c36;
          --primary: #f0f6fc;
          --secondary: #9198a1;
          --tertiary: #6e7681;
          --accent: #58a6ff;
        }
      }
      .display { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .mono    { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="1199" height="159" rx="8" fill="var(--bg)" stroke="var(--border)"/>

  <!-- col 1 · followers -->
  <rect x="80"  y="48" width="28" height="1.25" fill="var(--accent)" opacity="0.85"/>
  <text x="80"  y="104" class="display" font-size="52" font-weight="500" fill="var(--primary)" letter-spacing="-1.4">38</text>
  <text x="80"  y="132" class="mono" font-size="10.5" fill="var(--tertiary)" letter-spacing="1.6">FOLLOWERS</text>

  <!-- col 2 · stars -->
  <rect x="360" y="48" width="28" height="1.25" fill="var(--accent)" opacity="0.85"/>
  <text x="360" y="104" class="display" font-size="52" font-weight="500" fill="var(--primary)" letter-spacing="-1.4">467</text>
  <text x="360" y="132" class="mono" font-size="10.5" fill="var(--tertiary)" letter-spacing="1.6">STARS</text>

  <!-- col 3 · repos -->
  <rect x="640" y="48" width="28" height="1.25" fill="var(--accent)" opacity="0.85"/>
  <text x="640" y="104" class="display" font-size="52" font-weight="500" fill="var(--primary)" letter-spacing="-1.4">16</text>
  <text x="640" y="132" class="mono" font-size="10.5" fill="var(--tertiary)" letter-spacing="1.6">REPOSITORIES</text>

  <!-- col 4 · since -->
  <rect x="920" y="48" width="28" height="1.25" fill="var(--accent)" opacity="0.85"/>
  <text x="920" y="104" class="display" font-size="52" font-weight="500" fill="var(--primary)" letter-spacing="-1.4">2021</text>
  <text x="920" y="132" class="mono" font-size="10.5" fill="var(--tertiary)" letter-spacing="1.6">ON GITHUB SINCE</text>
</svg>

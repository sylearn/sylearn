<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">sylearn</title>
  <desc id="desc">sylearn – AI Developer &amp; Researcher at Nanjing University</desc>
  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --border: #d0d7de;
        --primary: #1F2328;
        --secondary: #656d76;
        --tertiary: #8b949e;
        --accent: #0969da;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --border: #30363d;
          --primary: #e6edf3;
          --secondary: #8b949e;
          --tertiary: #6e7681;
          --accent: #58a6ff;
        }
      }
    </style>
  </defs>

  <!-- Card -->
  <rect x="0.5" y="0.5" width="1199" height="219" rx="6" fill="var(--bg)" stroke="var(--border)"/>

  <!-- Accent mark -->
  <rect x="56" y="52" width="32" height="3" rx="1.5" fill="var(--accent)"/>

  <!-- Name -->
  <text x="56" y="96" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="600" fill="var(--primary)" letter-spacing="-0.8">sylearn</text>

  <!-- Role -->
  <text x="56" y="132" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="var(--secondary)">AI Developer · Researcher · Open Source Builder</text>

  <!-- Affiliation -->
  <text x="56" y="164" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="var(--tertiary)">Nanjing University · Computational Materials Science × AI</text>
</svg>

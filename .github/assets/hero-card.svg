<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">sylearn</title>
  <desc id="desc">sylearn — AI Developer &amp; Researcher at Nanjing University</desc>

  <defs>
    <style>
      :root {
        --bg: #ffffff;
        --border: #d8dee4;
        --primary: #1F2328;
        --secondary: #59636e;
        --tertiary: #818b98;
        --accent: #0969da;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --border: #262c36;
          --primary: #f0f6fc;
          --secondary: #9198a1;
          --tertiary: #6e7681;
          --accent: #58a6ff;
        }
      }
      .display  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .mono     { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- Card surface -->
  <rect x="0.5" y="0.5" width="1199" height="359" rx="8" fill="var(--bg)" stroke="var(--border)"/>

  <!-- Breathing accent dot -->
  <circle cx="80" cy="88" r="3.5" fill="var(--accent)">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Display name -->
  <text x="80" y="176" class="display" font-size="76" font-weight="600" fill="var(--primary)" letter-spacing="-2.2">sylearn</text>

  <!-- Subtitle -->
  <text x="80" y="216" class="display" font-size="20" font-weight="400" fill="var(--secondary)" letter-spacing="-0.1">AI Developer &amp; Researcher</text>

  <!-- Affiliation meta -->
  <text x="80" y="244" class="display" font-size="14" font-weight="400" fill="var(--tertiary)" letter-spacing="0.1">Nanjing University  ·  Computational Materials Science × AI</text>

  <!-- Hairline rule -->
  <rect x="80" y="274" width="40" height="1.25" fill="var(--accent)" opacity="0.9"/>

  <!-- Micro meta (bottom right) -->
  <text x="1120" y="312" class="mono" font-size="11" fill="var(--tertiary)" text-anchor="end" letter-spacing="0.6">2026  ·  NANJING</text>
</svg>
